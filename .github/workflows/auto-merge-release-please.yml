name: auto-merge-release-please

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - name: Merge release-please PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: gh pr merge "$PR_NUMBER" --merge --delete-branch=false
