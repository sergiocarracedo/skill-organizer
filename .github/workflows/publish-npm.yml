name: Publish to npm

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Determine dist-tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-alpha.* ]]; then
            echo "dist_tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta.* ]]; then
            echo "dist_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish --tag "${{ steps.meta.outputs.dist_tag }}" --access public

      - name: Verify published package
        run: |
          for attempt in 1 2 3 4 5; do
            PUBLISHED_VERSION=$(npm view skill-organizer version)
            if [[ "$PUBLISHED_VERSION" == "${{ steps.meta.outputs.version }}" ]]; then
              break
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "expected npm version ${{ steps.meta.outputs.version }}, got $PUBLISHED_VERSION"
              exit 1
            fi
            sleep 5
          done
          npm view skill-organizer dist-tags --json
